services:

  # ── Application PHP-FPM ────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: app
    container_name: agrofinance_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - pdf_storage:/var/www/storage/app/rapports
    networks:
      - agrofinance
    depends_on:
      - mysql
      - redis
    env_file:
      - .env

  # ── Worker queue rapports PDF ──────────────────────────────────────────────
  worker:
    build:
      context: .
      target: worker
    container_name: agrofinance_worker
    restart: unless-stopped
    working_dir: /var/www
    networks:
      - agrofinance
    depends_on:
      - mysql
      - redis
    env_file:
      - .env

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agrofinance_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - agrofinance
    depends_on:
      - app

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: agrofinance_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-agrofinanceplus}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-agrofinance}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agrofinance
    ports:
      - "3307:3306"     # 3307 pour eviter conflit XAMPP local

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agrofinance_redis
    restart: unless-stopped
    networks:
      - agrofinance

networks:
  agrofinance:
    driver: bridge

volumes:
  mysql_data:
  pdf_storage:
