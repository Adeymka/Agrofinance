services:

  # ── Init : copie les assets publics dans le volume partagé ──────────────────
  # Ce service s'exécute une seule fois au démarrage et s'arrête.
  init:
    build:
      context: .
      target: app
    image: agrofinance-app:latest
    container_name: agrofinance_init
    command: sh -c "cp -r /var/www/public/. /public-shared/"
    volumes:
      - public_assets:/public-shared
    restart: "no"

  # ── Application PHP-FPM ─────────────────────────────────────────────────────
  # Le code est DANS l'image. L'entrypoint attend MySQL, migre, démarre php-fpm.
  # Commande de build et démarrage :
  #   docker compose build
  #   docker compose up -d
  app:
    build:
      context: .
      target: app
    image: agrofinance-app:latest
    container_name: agrofinance_app
    restart: unless-stopped
    volumes:
      - pdf_storage:/var/www/storage/app/rapports
      - app_logs:/var/www/storage/logs
    networks:
      - agrofinance
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  # ── Worker queue rapports PDF ──────────────────────────────────────────────
  worker:
    build:
      context: .
      target: worker
    image: agrofinance-worker:latest
    container_name: agrofinance_worker
    restart: unless-stopped
    volumes:
      - pdf_storage:/var/www/storage/app/rapports
    networks:
      - agrofinance
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agrofinance_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Assets statiques copiés depuis l'image app via le service init
      - public_assets:/var/www/public:ro
    networks:
      - agrofinance
    depends_on:
      - init
      - app

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: agrofinance_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-agrofinanceplus}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-agrofinance}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agrofinance
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agrofinance_redis
    restart: unless-stopped
    networks:
      - agrofinance
    volumes:
      - redis_data:/data

networks:
  agrofinance:
    driver: bridge

volumes:
  mysql_data:
  pdf_storage:
  app_logs:
  redis_data:
  public_assets:      # Partagé entre init (écriture) et nginx (lecture)
